# 描述: 在proxy-providers加入您的机场订阅链接（代理提供者）

# ==================== 锚点配置 ====================
# 代理提供者模板 - 订阅源基础配置
BaseProvider: &BaseProvider {type: http, interval: 86400, proxy: DIRECT, health-check: {enable: true, url: 'https://www.google.com/generate_204', interval: 300}, filter: '^(?!.*(群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))'}

# 策略组类型模板 - 定义不同的策略组基础配置
# 故障转移
BaseFB: &BaseFB {type: fallback, interval: 200, lazy: true, url: 'https://www.google.com/generate_204'}
# 负载均衡-散列
BaseCH: &BaseCH {type: load-balance, interval: 200, lazy: true, url: 'https://www.google.com/generate_204', strategy: consistent-hashing, hidden: true}
# 负载均衡-轮询
BaseCR: &BaseCR {type: load-balance, interval: 200, lazy: true, url: 'https://www.google.com/generate_204', strategy: round-robin, hidden: true}
# 自动测速
BaseUT: &BaseUT {type: url-test, interval: 200, lazy: true, url: 'https://www.google.com/generate_204', hidden: true}

# 节点筛选正则表达式 - 基于地理位置和关键词过滤
FilterHK: &FilterHK '^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG))(?!.*(排除1|排除2|5x)).*$'
FilterSG: &FilterSG '^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP))(?!.*(排除1|排除2|5x)).*$'
FilterJP: &FilterJP '^(?=.*(?i)(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK))(?!.*(排除1|排除2|5x)).*$'
FilterKR: &FilterKR '^(?=.*(?i)(韩|🇰🇷|韓|首尔|南朝鲜|KR|KOR|Korea|South))(?!.*(排除1|排除2|5x)).*$'
FilterUS: &FilterUS '^(?=.*(?i)(美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD))(?!.*(排除1|排除2|5x)).*$'
FilterTW: &FilterTW '^(?=.*(?i)(台|🇼🇸|🇹🇼|TW|tai|TPE|TSA|KHH))(?!.*(排除1|排除2|5x)).*$'
FilterEU: &FilterEU '^(?=.*(?i)(奥|比|保|克罗地亚|塞|捷|丹|爱沙|芬|法|德|希|匈|爱尔|意|拉|立|卢|马其它|荷|波|葡|罗|斯洛伐|斯洛文|西|瑞|英|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|🇬🇧|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU))(?!.*(排除1|排除2|5x)).*$'
FilterOT: &FilterOT '^(?!.*(DIRECT|直接连接|美|港|坡|台|新|日|韩|奥|比|保|克罗地亚|塞|捷|丹|爱沙|芬|法|德|希|匈|爱尔|意|拉|立|卢|马其它|荷|波|葡|罗|斯洛伐|斯洛文|西|瑞|英|🇭🇰|🇼🇸|🇹🇼|🇸🇬|🇯🇵|🇰🇷|🇺🇸|🇬🇧|🇦🇹|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|HK|TW|SG|JP|KR|US|GB|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU|HKG|TPE|TSA|KHH|SIN|XSP|NRT|HND|KIX|CTS|FUK|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD|LHR|LGW))'
FilterAL: &FilterAL '^(?!.*(DIRECT|直接连接|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))'

# 策略组代理列表模板 - 预定义的代理节点优先级排序
SelectFB: &SelectFB {type: select, proxies: [手动选择, 直接连接, 故障转移, 香港策略, 狮城策略, 日本策略, 韩国策略, 美国策略, 台湾策略, 欧盟策略, 其余国家]}
SelectPY: &SelectPY {type: select, proxies: [默认代理, 故障转移, 香港策略, 狮城策略, 日本策略, 韩国策略, 美国策略, 台湾策略, 欧盟策略, 其余国家, 手动选择, 直接连接]}

# ==================== 代理提供者 ====================
# 注意：请提供您的机场订阅链接，每个链接一行，并为每个机场命名，末尾的[优][备]为每个节点添加机场名称前缀，可自定义
proxy-providers:
  # 优质订阅源 - 优质节点集合，使用时请修改
  优质服务商: {<<: *BaseProvider, url: '优质订阅源地址', override: {additional-prefix: '[优] '}}
  # 备用订阅源 - 次优节点集合，使用时请修改
  备用服务商: {<<: *BaseProvider, url: '备用订阅源地址', override: {additional-prefix: '[备] '}}

# ==================== 核心配置 ====================
# 基础配置
mode: rule                                                              # 工作模式  rule（规则模式）/ global（全局模式）/ direct（直连模式）
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893                                                        # 监听端口  HTTP + SOCKS5 混合代理端口
tproxy-port: 7895
ipv6: true                                                              # 网络协议  是否启用 IPv6 支持
allow-lan: true                                                         # 局域连接  是否允许局域网设备连接
unified-delay: true                                                     # 统一延迟  减少节点延迟抖动
tcp-concurrent: true                                                    # 并发连接  提升多任务性能
bind-address: "*"                                                       # 监听接口  监听的网络接口（* 表示所有接口）
log-level: warning                                                      # 日志级别  silent（静默）/ error（错误）/ warning（警告）/ info（信息）/ debug（调试）
find-process-mode: 'always'                                             # 基于进程名分流 Windows/macOS用 全匹配always 条件匹配 strict 安卓软路由环境必须将其改为 off 
keep-alive-idle: 600                                                    # 当一个 TCP 连接空闲了 600 秒（10 分钟）没有数据传输时，开始启动保活机制。
keep-alive-interval: 15                                                 # 启动保活后，每隔 15 秒向远端服务器发送一个空包（心跳包），直到收到回应，或者判定连接彻底断开
profile: { store-selected: true, store-fake-ip: true }                  # 保存选择  记住选择的节点和策略组、Fake-IP 映射

# 认证配置
authentication:
  - mihomo:yyds666
skip-auth-prefixes:
  - 192.168.1.0/24
  - 192.168.31.0/24
  - 192.168.100.0/24
  - 127.0.0.1/8

# 实验性功能
experimental:
  quic-go-disable-gso: true  
     
# 管理面板配置
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-ui-name: zashboard
external-ui: ui
external-controller: 127.0.0.1:9090
secret: yyds666

# 流量嗅探
sniffer:
  enable: true                                                          # 启用嗅探  提升分流准确性
  override-destination: true                                            # 成功解析  使用嗅探到的域名覆盖原始目标地址
  parse-pure-ip: true                                                   # 反向解析  解析纯 IP 连接（尝试反向解析获得域名）
  force-dns-mapping: true                                               # 强制映射  DNS 映射（对纯 IP 连接尝试 DNS 映射）
  sniff:
    QUIC: { ports: [443, 8443] }                                        # 嗅探参数  QUIC 协议流量（HTTP/3 常用端口）
    TLS:  { ports: [443, 8443] }                                        # 嗅探参数  HTTPS（TLS）常用及备用端口
    HTTP: { ports: [80, 8080-8880], override-destination: true }        # 嗅探参数  HTTP 及常见 Web / 代理端口段(嗅探成功后覆盖目标地址)
  force-domain:
    - "+.netflix.com"                                                   # 强制嗅探  Netflix 主域名
    - "+.nflxvideo.net"                                                 # 强制嗅探  Netflix CDN
    - "+.amazonaws.com"                                                 # 强制嗅探  AWS 云服务
    - "+.media.dssott.com"                                              # 强制嗅探  Disney+ 流媒体
    - "+.tiktok.com"                                                    # 强制嗅探  TikTok 流媒体
  skip-domain:
    - Mijia Cloud                                                       # 跳过嗅探  米家云服务
    - dlg.io.mi.com                                                     # 跳过嗅探  小米设备通信
    - "+.oray.com"                                                      # 跳过嗅探  花生壳服务
    - "+.sunlogin.net"                                                  # 跳过嗅探  向日葵远程控制
    - "+.push.apple.com"                                                # 跳过嗅探  苹果推送服务

# TUN模式配置
tun:
  enable: true                                                          # 网卡模式  是否启用 TUN 虚拟网卡模式  
  stack: mixed                                                          # 协议类型  网络栈：system（系统栈）/ gvisor（内置用户态栈）/ mixed（混合）
  dns-hijack: [any:53, tcp://any:53]                                    # 劫持请求  劫持所有 UDP/TCP 53 端口的 DNS 请求
  auto-detect-interface: true                                           # 自动出口  自动识别默认出口网络接口 （仅内核模式有效）
  auto-route: true                                                      # 自动路由  自动添加系统路由表      （仅内核模式有效）
  auto-redirect: true                                                   # 自动定向  自动将流量重定向至 TUN  （仅内核模式有效）
  strict-route: false                                                   # 路由模式  严格路由模式
  endpoint-independent-nat: true                                        # 端点无关  NAT（提高 NAT 类型兼容性，适用于 P2P 和游戏）
    
# DNS配置
dns:
  enable: true                                                          # 解析服务  启用 Clash 内置 DNS 服务
  ipv6: true                                                            # 网络协议  启用 IPv6 DNS 解析支持
  listen: 0.0.0.0:7874                                                  # 监听服务  DNS 服务监听地址与端口
  enhanced-mode: fake-ip                                                # 增强模式  FDNS 增强模式（Fake-IP，用于防止 DNS 泄露）
  fake-ip-range: 198.18.0.1/16                                          # 虚拟地址  Fake-IP 虚拟地址池范围
  fake-ip-filter-mode: blacklist                                        # 过滤模式  Fake-IP 过滤模式（命中规则则返回真实 IP）
  respect-rules: false                                                  # 遵循规则  不强制遵循规则顺序
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fake-ip-filter:
    - rule-set:Direct
    - rule-set:Private
    - rule-set:China
    - +.miwifi.com
    - +.docker.io
    - +.market.xiaomi.com
    - +.push.apple.com

